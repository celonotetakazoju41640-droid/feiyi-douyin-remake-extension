<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>飞蚁抖音复刻</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popupShell">
      <header class="popupHeader">
        <img class="brandLogo" src="../images/feiyi-logo.png" alt="飞蚁" />
        <div class="popupHeaderText">
          <h1>飞蚁抖音复刻</h1>
          <p>选择蒸馏模型 / 上传商品图 / AI 自动补提示词</p>
        </div>
        <span id="status" class="popupBadge">检测中</span>
      </header>

      <section class="popupPanel popupHeroPanel">
        <div class="popupPanelHead">
          <div>
            <strong>生成工作台</strong>
            <p id="popupHeroSummary">先选蒸馏模型，再传商品图，剩下交给系统自动往下走。</p>
          </div>
        </div>
        <ol class="popupFlowList">
          <li>选择蒸馏模型</li>
          <li>上传商品图</li>
          <li>AI 自动识别卖点和场景</li>
          <li>自动补提示词</li>
          <li>一键生成叙事图并带走结果</li>
        </ol>
        <div class="popupActions popupPrimaryActions">
          <button id="openWorkspaceButton" type="button">打开生成工作台</button>
          <button id="openLatestProjectButton" class="secondaryButton" type="button">查看最近结果</button>
        </div>
      </section>

      <section class="popupPanel">
        <div class="popupPanelHead">
          <div>
            <strong>最近项目</strong>
            <p id="taskSummary">还没有最近项目，先打开生成工作台跑第一轮。</p>
          </div>
          <span id="taskState" class="popupBadge">未开始</span>
        </div>
        <div id="latestProjectSnapshot" class="latestProjectSnapshot">
          <p class="emptyState">生成完成后，这里会直接显示模板、卖点、任务数和下一步。</p>
        </div>
        <div class="popupActions">
          <button id="copySummaryButton" class="secondaryButton" type="button" disabled>复制提示词草稿</button>
          <button id="copyClipcatButton" type="button" disabled>复制结果包摘要</button>
        </div>
      </section>

      <section class="popupPanel">
        <div class="popupPanelHead">
          <div>
            <strong>最近项目列表</strong>
            <p>先看最新项目，不再把旧的拆解口径混进来。</p>
          </div>
          <span id="projectCount" class="popupBadge">0 个</span>
        </div>
        <div id="projectList" class="projectList">
          <p class="emptyState">还没有本地项目。</p>
        </div>
      </section>

      <pre id="result"></pre>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
